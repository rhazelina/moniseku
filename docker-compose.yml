services:
  app:
    build: .
    container_name: rfid_patroli_app
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./app:/var/www/html/app
      - ./public:/var/www/html/public
      - ./writable:/var/www/html/writable
    environment:
      - CI_ENVIRONMENT=development
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: rfid_patroli_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: rfid_patroli
      MYSQL_USER: rfid_user
      MYSQL_PASSWORD: rfid_pass
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data: